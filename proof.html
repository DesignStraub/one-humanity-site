<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proof – One Planet, One Humanity</title>

  <style>
    :root{
      --c-bg:#f6f2eb;
      --c-fg:#1a1a18;
      --c-soft:#797268;
      --c-line:#e3dbcf;
      --c-forest:#314137;
      --c-forest-text:#eef4eb;
      --radius:24px;
    }

    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background:var(--c-bg);
      color:var(--c-fg);
      line-height:1.7;
    }

    .wrap{
      width:min(800px,92vw);
      margin:0 auto;
    }

    /* HEADER */

    .header{
      background:var(--c-forest);
      color:var(--c-forest-text);
      padding:32px 0;
      text-align:center;
    }

    .header h1{
      margin:0;
      font-weight:500;
      letter-spacing:0.1em;
    }

    /* HERO */

    .hero{
      padding:80px 0 40px;
      text-align:center;
    }

    .hero h2{
      font-size:clamp(28px,5vw,42px);
      font-weight:500;
      margin:0 0 20px;
    }

    .hero p{
      color:var(--c-soft);
      max-width:500px;
      margin:0 auto;
    }

    /* SECTION */

    .section{
      padding:60px 0;
      border-top:1px solid var(--c-line);
    }

    .section p{
      max-width:520px;
      margin:0 auto;
      text-align:center;
      color:var(--c-soft);
    }

    /* STEPS */

    .steps{
      display:grid;
      gap:20px;
      margin-top:40px;
    }

    .step{
      border:1px solid var(--c-line);
      border-radius:var(--radius);
      padding:20px;
      text-align:center;
      background:white;
    }

    .step strong{
      display:block;
      margin-bottom:6px;
      font-weight:500;
    }

    /* FOOTER */

    .footer{
      padding:60px 0 80px;
      text-align:center;
      color:var(--c-soft);
      font-size:14px;
    }

    /* subtle fade in */

    .fade{
      opacity:0;
      transform:translateY(10px);
      animation:fadeIn 0.8s ease forwards;
    }

    .fade:nth-child(2){animation-delay:0.1s}
    .fade:nth-child(3){animation-delay:0.2s}
    .fade:nth-child(4){animation-delay:0.3s}

    @keyframes fadeIn{
      to{
        opacity:1;
        transform:none;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="wrap">
      <h1>PROOF</h1>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero wrap fade">
    <h2>See your day.</h2>
    <p>
      No tracking. No goals. No pressure.
      <br>
      Just what actually happened.
    </p>
  </div>

  <!-- HOW IT WORKS -->
  <div class="section wrap fade">
    <div class="steps">

      <div class="step">
        <strong>1</strong>
        Place what happened
      </div>

      <div class="step">
        <strong>2</strong>
        White or black
      </div>

      <div class="step">
        <strong>3</strong>
        Move it tomorrow
      </div>

    </div>
  </div>

  <!-- MEANING -->
  <div class="section wrap fade">
    <p>
      It doesn’t judge.
      <br>
      It doesn’t guide.
      <br><br>
      It just shows you
      what you already know.
    </p>
  </div>

  <!-- FOOTER -->
  <div class="footer wrap fade">
    One Planet, One Humanity
  </div>

</body>
</html>
