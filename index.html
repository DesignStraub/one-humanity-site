<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>OneHumanity</title>
  <meta name="description" content="OneHumanity · One Planet · No Differences.">
  <meta name="theme-color" content="#000000">
  <style>
    :root{
      --bg-hero: url('./images/earth-gray.jpg');
      --c-bg:#fafafa;
      --c-fg:#0e0e0e;
      --c-line:#e4e4e4;
      --c-soft:#666;
      --c-blue:#6aa7ff;
      --c-pink:#f3a4d8;
      --shadow:0 18px 42px rgba(0,0,0,.16);
      --shadow-soft:0 10px 26px rgba(0,0,0,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--c-bg);
      color:var(--c-fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,sans-serif;
      line-height:1.6;
      overflow-x:hidden;
    }

    a{color:var(--c-fg); text-decoration:none}
    a:focus{outline:2px solid #888; outline-offset:4px}

    /* NAV */
    .nav{
      position:fixed;
      inset:0 0 auto 0;
      min-height:64px;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      padding:8px 18px;
      z-index:50;
      background:rgba(0,0,0,.92);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .brand .logo{
      width:28px;
      height:28px;
      color:#fff;
    }
    .brand .title{
      font-weight:600;
      letter-spacing:.2px;
      color:#fff;
    }
    .nav .right{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
    }
    .nav a.item,
    .lang-toggle button{
      padding:8px 12px;
      border-radius:10px;
      border:1px solid transparent;
      color:#fff;
      background:transparent;
      font:inherit;
      cursor:pointer;
      transition:background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .nav a.item:hover,
    .lang-toggle button:hover{
      border-color:rgba(255,255,255,.35);
      background:rgba(255,255,255,.08);
      transform:translateY(-1px);
    }
    .lang-toggle{
      display:flex;
      gap:4px;
    }
    .lang-toggle button.active{
      border-color:rgba(255,255,255,.35);
      background:linear-gradient(135deg, rgba(106,167,255,.18), rgba(243,164,216,.18));
    }

    /* HERO */
    .hero{
      position:relative;
      min-height:100svh;
      display:grid;
      place-items:center;
      overflow:hidden;
      isolation:isolate;
      padding:96px 20px 40px;
    }
    .hero::before,
    .hero::after{
      content:"";
      position:absolute;
      inset:-10% -10% -10% -10%;
      z-index:-2;
      background-size:cover;
      background-position:center;
      transform:scale(1.04);
      animation:kenburns 28s ease-in-out infinite alternate;
    }
    .hero::before{
      background-image:var(--bg-hero);
      opacity:.26;
      filter:grayscale(100%) contrast(1) brightness(.92);
    }
    .hero::after{
      background-image:
        radial-gradient(circle at 18% 22%, rgba(106,167,255,.22), transparent 24%),
        radial-gradient(circle at 84% 28%, rgba(243,164,216,.20), transparent 24%),
        radial-gradient(circle at 50% 72%, rgba(106,167,255,.10), transparent 24%),
        radial-gradient(ellipse at 60% 45%, rgba(0,0,0,.0) 0%, rgba(0,0,0,.14) 55%, rgba(0,0,0,.62) 100%);
      z-index:-1;
      animation:none;
      transform:none;
    }

    @keyframes kenburns{
      from{ transform:scale(1.04) translateY(-1%)}
      to{ transform:scale(1.12) translateY(2%)}
    }

    .grain{
      pointer-events:none;
      position:absolute;
      inset:0;
      z-index:0;
      opacity:.08;
      mix-blend-mode:soft-light;
    }

    .hero-inner{
      width:min(1200px, 92vw);
      min-height:calc(100svh - 140px);
      display:grid;
      place-items:center;
      position:relative;
      z-index:1;
    }

    /* STICKER / IMAGE */
    .hero-sticker-wrap{
      display:grid;
      place-items:center;
      width:100%;
    }

    .sticker-card{
      width:min(100%, 520px);
      perspective:1100px;
      position:relative;
    }

    .sticker-card::before{
      content:"";
      position:absolute;
      inset:auto 10% -26px 10%;
      height:34px;
      background:radial-gradient(ellipse at center, rgba(0,0,0,.18), rgba(0,0,0,0));
      filter:blur(12px);
      z-index:0;
      pointer-events:none;
    }

    .sticker{
      position:relative;
      z-index:1;
      width:100%;
      border-radius:32px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(244,244,244,.93));
      border:1px solid rgba(0,0,0,.08);
      box-shadow:var(--shadow);
      overflow:hidden;
      transform-style:preserve-3d;
      transition:transform .18s ease-out, box-shadow .18s ease-out;
      animation:idleFloat 4.6s ease-in-out infinite;
    }

    @keyframes idleFloat{
      0%,100%{transform:translateY(0px) rotateZ(-.3deg)}
      50%{transform:translateY(-6px) rotateZ(.3deg)}
    }

    .sticker::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.82), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,.30), transparent 34%),
        linear-gradient(180deg, rgba(106,167,255,.08), transparent 24%),
        linear-gradient(0deg, rgba(243,164,216,.08), transparent 24%);
      pointer-events:none;
      z-index:2;
    }

    .sticker::after{
      content:"";
      position:absolute;
      top:-8%;
      left:-30%;
      width:42%;
      height:130%;
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.42), rgba(255,255,255,0));
      transform:rotate(12deg);
      opacity:.65;
      pointer-events:none;
      animation:shineSweep 5.2s ease-in-out infinite;
      z-index:3;
    }

    @keyframes shineSweep{
      0%, 78%, 100%{transform:translateX(0) rotate(12deg); opacity:0}
      8%, 20%{opacity:.6}
      26%{transform:translateX(320%) rotate(12deg); opacity:0}
    }

    .sticker img{
      width:100%;
      height:auto;
      display:block;
      object-fit:cover;
      position:relative;
      z-index:1;
    }

    footer{
      padding:24px 20px 34px;
      position:relative;
      z-index:2;
    }

    .foot{
      width:min(1100px, 92vw);
      margin:0 auto;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:16px;
      color:#666;
      text-align:center;
    }

    .foot a{
      color:#111;
      font-weight:600;
      transition:opacity .18s ease;
    }

    .foot a:hover{
      opacity:.68;
    }

    .reveal{
      opacity:0;
      transform:translateY(12px);
      transition:opacity .7s ease, transform .7s ease;
    }
    .reveal.in{
      opacity:1;
      transform:none;
    }

    @media (prefers-reduced-motion: reduce){
      .hero::before,
      .sticker,
      .sticker::after{ animation:none }
      .reveal{ transition:none }
    }

    @media (max-width: 900px){
      .nav{ padding:10px 12px }
      .brand{ margin-bottom:6px }
      .nav .right{
        width:100%;
        display:flex;
        justify-content:flex-end;
        gap:6px;
        flex-wrap:wrap;
      }
      .nav a.item,
      .lang-toggle button{ padding:10px 12px }
    }

    @media (max-width: 560px){
      .nav .right{ row-gap:6px }
      .sticker-card{ width:min(100%, 360px) }
      .brand .title{ font-size:15px }
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav" data-testid="nav">
    <a href="#top" class="brand" aria-label="Homepage">
      <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">
        <path d="M20 28c0-5.5 4.5-10 10-10 3.1 0 6 1.5 7.9 4 1.9-2.5 4.8-4 7.9-4 5.5 0 10 4.5 10 10 0 11.8-18.1 19.4-18.1 19.4S20 39.8 20 28z" fill="currentColor"/>
      </svg>
      <span class="title">OneHumanity</span>
    </a>

    <div class="right" role="navigation" aria-label="Main navigation">
      <div class="lang-toggle" aria-label="Change language">
        <button id="lang-de" type="button">DE</button>
        <button id="lang-en" class="active" type="button">EN</button>
      </div>
      <a class="item" href="impressum.html" data-i18n="legal">Legal notice</a>
      <a class="item" href="datenschutz.html" data-i18n="privacy">Privacy</a>
    </div>
  </nav>

  <header class="hero" id="top" aria-label="Intro" data-testid="hero">
    <svg class="grain" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/></filter>
      <rect width="100" height="100" filter="url(#noise)" opacity="1"></rect>
    </svg>

    <div class="hero-inner">
      <div class="hero-sticker-wrap reveal">
        <div class="sticker-card" id="stickerCard">
          <div class="sticker" id="stickerTilt">
            <img src="./images/sticker-main.png" alt="OneHumanity sticker" id="stickerImage">
          </div>
        </div>
      </div>
    </div>
  </header>

  <footer>
    <div class="foot">
      <a href="https://instagram.com/marcelloswigswag" target="_blank" rel="noopener">@marcelloswigswag</a>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('nav');

    const onScroll = () => {
      if (window.scrollY > 8) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    };
    document.addEventListener('scroll', onScroll, { passive:true });
    onScroll();

    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const id = a.getAttribute('href');
        const el = document.querySelector(id);
        if(!el) return;
        e.preventDefault();
        el.scrollIntoView({ behavior:'smooth', block:'start' });
      });
    });

    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if(en.isIntersecting){
          en.target.classList.add('in');
          io.unobserve(en.target);
        }
      });
    }, { threshold:.16 });

    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    const stickerCard = document.getElementById('stickerCard');
    const stickerTilt = document.getElementById('stickerTilt');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (!reduceMotion && stickerCard && stickerTilt) {
      stickerCard.addEventListener('mousemove', (e) => {
        const rect = stickerCard.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const px = (x / rect.width - 0.5) * 2;
        const py = (y / rect.height - 0.5) * 2;

        stickerTilt.style.transform =
          `rotateX(${(-py * 7).toFixed(2)}deg) rotateY(${(px * 8).toFixed(2)}deg) translateY(-4px)`;
      });

      stickerCard.addEventListener('mouseleave', () => {
        stickerTilt.style.transform = '';
      });
    }

    const translations = {
      de: {
        legal: 'Impressum',
        privacy: 'Datenschutz'
      },
      en: {
        legal: 'Legal notice',
        privacy: 'Privacy'
      }
    };

    const langButtons = {
      de: document.getElementById('lang-de'),
      en: document.getElementById('lang-en')
    };

    function setLang(lang) {
      const dict = translations[lang];
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.textContent = dict[key];
      });

      Object.entries(langButtons).forEach(([key, btn]) => {
        btn.classList.toggle('active', key === lang);
      });

      localStorage.setItem('onehumanity-lang', lang);
    }

    langButtons.de.addEventListener('click', () => setLang('de'));
    langButtons.en.addEventListener('click', () => setLang('en'));

    setLang('en');

    (function runSmokeTests(){
      try{
        console.assert(document.querySelector('[data-testid="nav"]'), 'Nav fehlt');
        console.assert(document.querySelector('[data-testid="hero"]'), 'Hero fehlt');
        console.assert(document.querySelector('#stickerImage'), 'Bild fehlt');
        console.assert(document.querySelector('#lang-de') && document.querySelector('#lang-en'), 'Sprachumschalter fehlt');
        console.log('[OneHumanity] Smoke-Tests ok');
      }catch(e){
        console.warn('[OneHumanity] Smoke-Test Warnung:', e);
      }
    })();
  </script>
</body>
</html>
