<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>OneHumanity</title>

  <style>
    :root{
      --bg-hero: url('./images/earth-gray.jpg');
      --c-bg:#fafafa;
      --c-fg:#0e0e0e;
      --c-line:#e4e4e4;
      --blue:#6aa7ff;
      --pink:#f3a4d8;
    }

    body{
      margin:0;
      font-family:system-ui;
      background:var(--c-bg);
      color:var(--c-fg);
    }

    /* NAV */
    .nav{
      position:fixed;
      width:100%;
      display:flex;
      justify-content:space-between;
      padding:10px 20px;
      background:#000;
      color:#fff;
    }

    .nav a{color:#fff;text-decoration:none;margin-left:10px}

    /* HERO */
    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg-hero) center/cover;
    }

    .hero-inner{
      display:grid;
      grid-template-columns:1fr 400px;
      gap:40px;
      width:90%;
      max-width:1200px;
    }

    .headline{
      font-size:clamp(30px,5vw,60px);
    }

    /* STICKER */
    .sticker-card{
      perspective:1000px;
    }

    .sticker{
      width:100%;
      aspect-ratio:1;
      border-radius:20px;
      overflow:hidden;
      background:white;
      box-shadow:0 20px 40px rgba(0,0,0,.2);
      transition:transform .2s ease;
      position:relative;
    }

    .sticker::after{
      content:"";
      position:absolute;
      top:0;
      left:-50%;
      width:50%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
      transform:skewX(-20deg);
      animation:shine 5s infinite;
    }

    @keyframes shine{
      0%{left:-50%}
      50%{left:120%}
      100%{left:120%}
    }

    .sticker img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* CTA */
    .btn{
      padding:10px 14px;
      border:1px solid black;
      border-radius:10px;
      display:inline-block;
      margin-top:10px;
    }

    /* MOBILE */
    @media(max-width:900px){
      .hero-inner{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<nav class="nav">
  <div>OneHumanity</div>
  <div>
    <button onclick="setLang('de')">DE</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">

    <div>
      <h1 class="headline" id="headline">
        Eine Menschheit · Ein Planet · Keine Unterschiede
      </h1>
      <p id="text">
        Unter der Oberfläche sind wir eins.
      </p>

      <a class="btn" href="#mitmachen">Sticker</a>
    </div>

    <div class="sticker-card" id="card">
      <div class="sticker" id="sticker">
        <img src="./images/sticker-placeholder.jpg" alt="Sticker Placeholder">
      </div>
    </div>

  </div>
</section>

<section id="mitmachen" style="padding:60px;">
  <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScWkpiObt9dsZZTg1nW82hWRVyb8-oSdZoOqfZSrBDZrqmtzw/viewform" target="_blank">
    Sticker anfragen
  </a>

  <a class="btn" href="https://raw.githubusercontent.com/DesignStraub/one-humanity-site/main/oneforall.pdf" target="_blank">
    PDF downloaden
  </a>

  <a class="btn" href="https://ko-fi.com/oneplanetonehumanity" target="_blank">
    Support
  </a>
</section>

<script>
/* STICKER HOVER */
const card = document.getElementById("card");
const sticker = document.getElementById("sticker");

card.addEventListener("mousemove", e => {
  const rect = card.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;

  sticker.style.transform =
    `rotateX(${ -y * 10 }deg) rotateY(${ x * 10 }deg)`;
});

card.addEventListener("mouseleave", () => {
  sticker.style.transform = "rotateX(0) rotateY(0)";
});

/* LANGUAGE SWITCH */
const content = {
  de:{
    headline:"Eine Menschheit · Ein Planet · Keine Unterschiede",
    text:"Unter der Oberfläche sind wir eins."
  },
  en:{
    headline:"One Humanity · One Planet · No Differences",
    text:"Under the surface, we are one."
  }
};

function setLang(lang){
  document.getElementById("headline").innerText = content[lang].headline;
  document.getElementById("text").innerText = content[lang].text;
}
</script>

</body>
</html>
