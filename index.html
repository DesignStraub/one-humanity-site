<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Humanity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .content {
      max-width: 600px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.8;
    }

    /* Sticker */
    .sticker {
      margin-top: 30px;
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .sticker img {
      width: 200px;
      height: auto;
      display: block;
    }

    .sticker:hover {
      transform: scale(1.08) rotate(-2deg);
    }

    /* subtle color accents */
    .accent {
      background: linear-gradient(90deg, #00aaff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    footer a {
      color: #000;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="content">
      <h1 class="accent">ONE HUMANITY</h1>
      <p>We are not separate. We just forgot.</p>

      <div class="sticker">
        <!-- DEIN STICKER -->
        <img src="sticker.png" alt="Sticker">
      </div>
    </div>
  </div>

  <footer>
    <a href="https://instagram.com/marcelloswigswag" target="_blank">
      @marcelloswigswag
    </a>
  </footer>

</body>
</html>
